name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v1.0.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    # Each OS builds the bundled stitcher from vendored Python source via
    # PyInstaller, then packages the Electron app via electron-builder.
    # electron-builder is configured with publish:github in package.json, so
    # the produced installers + auto-update manifests (latest*.yml + .blockmap)
    # are uploaded to the release keyed by the pushed tag. On manual dispatch
    # the workflow checks out the named tag and uploads to the existing
    # release at that tag.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist
          - os: macos-14
            script: 'dist:mac'
          - os: ubuntu-latest
            script: 'dist:linux'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve tag ref
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: stitcher/requirements.txt

      - name: Install Python build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r stitcher/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm ci

      - name: Install sharp cross-platform binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          npm install --force @img/sharp-darwin-arm64@0.33.5 @img/sharp-libvips-darwin-arm64@1.0.4

      - name: Build bundled stitcher from vendored source
        run: npm run build-stitcher

      - name: Build and publish app
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          for app in dist/mac*/*.app; do
            if [ -d "$app" ]; then
              echo "Signing $app"
              codesign --force --deep --sign - "$app"
            fi
          done

      - name: Upload artifacts (CI debug copy)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  publish:
    # Finalize the draft release electron-builder created during build.
    # If the release already exists as non-draft (e.g. workflow triggered
    # manually against a published RC to append Mac/Linux artifacts), this
    # step no-ops.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Finalize release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          REL_ID=$(gh api "repos/$REPO/releases" \
            --jq ".[] | select(.tag_name==\"$TAG\" and .draft==true) | .id" \
            | head -1)

          if [ -z "$REL_ID" ]; then
            echo "No draft release found for $TAG — already published, nothing to finalize."
            gh release view "$TAG" --repo "$REPO" || true
            exit 0
          fi

          if [[ "$TAG" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "Finalizing release $REL_ID for tag $TAG (prerelease=$PRERELEASE)"
          gh api -X PATCH "repos/$REPO/releases/$REL_ID" \
            -F draft=false \
            -F prerelease=$PRERELEASE \
            -f name="$TAG" \
            > /dev/null

          echo "Published:"
          gh release view "$TAG" --repo "$REPO"
