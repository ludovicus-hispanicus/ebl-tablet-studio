name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Pinned standalone stitcher release (bundled as resources/stitcher/ via
  # electron-builder extraResources). Update when a newer stitcher release
  # is ready to ship. Phase B vendors stitcher source into this repo,
  # eliminating the cross-repo download.
  STITCHER_VERSION: v2.0-rc.16
  STITCHER_REPO: ludovicus-hispanicus/ebl-photo-stitcher

jobs:
  build:
    # Each OS builds with electron-builder, which (because build.publish is
    # configured in package.json and GH_TOKEN is set) uploads artifacts AND
    # the auto-update manifests (latest*.yml + .blockmap) directly into a
    # single draft release on GitHub keyed by the pushed tag. All three
    # matrix jobs land in the same draft.
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: dist
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install sharp cross-platform binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          npm install --force @img/sharp-darwin-x64@0.33.5 @img/sharp-libvips-darwin-x64@1.0.4
          npm install --force @img/sharp-darwin-arm64@0.33.5 @img/sharp-libvips-darwin-arm64@1.0.4

      - name: Download bundled stitcher (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p resources/stitcher
          gh release download "$STITCHER_VERSION" \
            --repo "$STITCHER_REPO" \
            --pattern "eBL*Stitcher.exe" \
            --dir resources/stitcher
          ls -la resources/stitcher

      - name: Download bundled stitcher (macOS arm64)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p resources/stitcher /tmp/stitcher-dmg
          gh release download "$STITCHER_VERSION" \
            --repo "$STITCHER_REPO" \
            --pattern "*macOS_arm64.dmg" \
            --dir /tmp/stitcher-dmg
          DMG=$(ls /tmp/stitcher-dmg/*.dmg | head -1)
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint /tmp/stitcher-mount
          cp -R "/tmp/stitcher-mount/eBL Photo Stitcher.app" resources/stitcher/
          hdiutil detach /tmp/stitcher-mount
          ls -la resources/stitcher

      - name: Prepare empty stitcher dir (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p resources/stitcher
          echo "Stitcher is not shipped on Linux (Phase A)." > resources/stitcher/README.txt

      - name: Build and publish
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          for app in dist/mac*/*.app; do
            if [ -d "$app" ]; then
              echo "Signing $app"
              codesign --force --deep --sign - "$app"
            fi
          done

      - name: Upload artifacts (CI debug copy)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  publish:
    # Finalize the draft release electron-builder created during build.
    # Uses the GitHub API directly — softprops/action-gh-release was creating
    # a duplicate release that collided on finalize, so this job simply
    # patches the existing draft to { draft: false, prerelease: contains(ref, '-') }.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Finalize release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Find the draft release electron-builder created for this tag.
          REL_ID=$(gh api "repos/$REPO/releases" \
            --jq ".[] | select(.tag_name==\"$TAG\" and .draft==true) | .id" \
            | head -1)

          if [ -z "$REL_ID" ]; then
            echo "No draft release found for $TAG — assuming already published."
            gh release view "$TAG" --repo "$REPO" || true
            exit 0
          fi

          # Tags containing a hyphen (v1.2.3-beta.1, v1.2.3-rc.1) = prerelease.
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "Finalizing release $REL_ID for tag $TAG (prerelease=$PRERELEASE)"
          gh api -X PATCH "repos/$REPO/releases/$REL_ID" \
            -F draft=false \
            -F prerelease=$PRERELEASE \
            -f name="$TAG" \
            > /dev/null

          echo "Published:"
          gh release view "$TAG" --repo "$REPO"
