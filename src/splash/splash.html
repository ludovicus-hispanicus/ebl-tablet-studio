<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>eBL Tablet Studio</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }
    .splash {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #1a2a3a 0%, #0e1a28 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f0f0f0;
      box-sizing: border-box;
      padding: 32px;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .version {
      font-size: 11px;
      opacity: 0.55;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .status {
      font-size: 13px;
      opacity: 0.9;
      text-align: center;
      min-height: 18px;
      margin-bottom: 16px;
      letter-spacing: 0.2px;
    }
    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="../../assets/icons/icon.png" alt="eBL Tablet Studio" />
    <div class="title">eBL Tablet Studio</div>
    <div class="version" id="version"></div>
    <div class="status" id="status">Starting&hellip;</div>
    <div class="spinner"></div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('splash-status', (event, message) => {
      const el = document.getElementById('status');
      if (el) el.textContent = message;
    });
    ipcRenderer.on('splash-version', (event, version) => {
      const el = document.getElementById('version');
      if (el) el.textContent = 'v' + version;
    });
  </script>
</body>
</html>
